name: Build V5.1 debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  RASPI_KEYSTORE_BASE64: ${{ secrets.RASPI_KEYSTORE_BASE64 }}

jobs:
  build:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK 36
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.4.1"

      - name: Prepare persistent signing key
        id: signing
        if: env.RASPI_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/raspicar-signing.jks"
          printf '%s' "$RASPI_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        env:
          RASPI_KEYSTORE_PATH: ${{ steps.signing.outputs.path }}
          RASPI_KEYSTORE_PASSWORD: ${{ secrets.RASPI_KEYSTORE_PASSWORD }}
          RASPI_KEY_ALIAS: ${{ secrets.RASPI_KEY_ALIAS }}
          RASPI_KEY_PASSWORD: ${{ secrets.RASPI_KEY_PASSWORD }}
        run: gradle --no-daemon assembleDebug --stacktrace

      - name: Verify APK exists
        run: test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RaspiCarDashboard-v5.1-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
